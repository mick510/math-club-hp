<!DOCTYPE html>

<html>
  <head>
    <title>
      SUO Math Club - Contact
    </title>
    <link rel="stylesheet" href="styles/general.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
    <link rel="stylesheet" href="styles/contact.css">
  </head>

  <body>
    <header>
      <div class="big-header">
        <img src="images/elementor-placeholder-image.png" class="logo-header">
        
        <div class="dropdown">
          Events &amp; Announcements

          <div class="dropdown-content">
            <p>Upcoming events</p>
            <p>Announcement list</p>
          </div>
        </div>

        <div class="dropdown">
          <p class="dropdown-menu">Resources</p>

          <div class="dropdown-content">
            <p>MATH</p>
            <p>STAT</p>
            <p>Other</p>
          </div>
        </div>
        
        <p class="dropdown-menu">Merch</p>
        <p class="this-page">Contact</p>
        <button class="login">
          Login 
        </button>
      </div>

      <div class="small-header">
        <img src="images/elementor-placeholder-image.png" class="logo-header">

        <img src="images/elementor-placeholder-image.png" class="logo-header">
        <!--three lines-->
      </div>
    </header>

    <div class="section">
      <div class="heading">Contact Us</div>

      <div class="cols">
        <div class="col">
          <p class="contact-heading">Contact Form</p>

          <div class="contact-form">
            <div class="contact-form-contents">
              <p>Name</p>
              <input type="text" class="contact-name">
              <p>Email address</p>
              <input type="email" class="contact-email">
              <p>Message</p> 
              <textarea class="contact-message"></textarea>
              <button>Submit</button>
            </div>
          </div>
        </div>

        <div class="col">
          <p class="contact-heading">Social Media</p>

          <div class="social-media-list"></div>

          <p class="contact-heading">Regular Meeting Times</p>
          <div class="meeting-time-list"></div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <div class="upper-sec">
        <div class="logo-contact">
          <img src="images/elementor-placeholder-image.png" class="footer-logo">

          <button class="contact-button">Contact</button>
        </div>

        <div class="page-list">
          <div class="page-list-col">
            <p>Events</p>
            <p>Announcements</p>
            <p>Resources</p>
          </div>

          <div class="page-list-col">
            <p>Blog</p>
            <p>Merch</p>
            <p>Contact</p>
          </div>
        </div>

        <div class="sm-sec">
          <p class="sm-title">Find us on</p>
          <!--insta, disco, rubric, mail-->
          <div class="sm-list">
            <img src="images/elementor-placeholder-image.png" class="sm-img">

            <img src="images/elementor-placeholder-image.png" class="sm-img">

            <img src="images/elementor-placeholder-image.png" class="sm-img">

            <img src="images/elementor-placeholder-image.png" class="sm-img">
          </div>
        </div>
      </div>

      <div class="lower-sec">
        <p>&copy; SUO Math Club 2026</p>
      </div>
    </div>
  </body>
</html>
